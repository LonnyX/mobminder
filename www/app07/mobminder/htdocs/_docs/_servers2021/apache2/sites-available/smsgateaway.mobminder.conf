<VirtualHost *:80>
        ServerAdmin webmaster-noreply@mobminder.com
        ServerName smsgateaway.mobminder.com

        DocumentRoot /var/www/mobminder/htdocs/smsgateaway

	<Directory /var/www/mobminder/htdocs/>
		AllowOverride none
	</Directory>
        <Directory /var/www/mobminder/htdocs/smsgateaway/>
		Require all granted
                Options FollowSymLinks MultiViews
                AllowOverride All
                Order allow,deny
                allow from all
        </Directory>

        ErrorLog ${APACHE_LOG_DIR}/smsgateaway.mobminder.com-error.log

        # Possible values include: debug, info, notice, warn, error, crit,
        # alert, emerg.
        LogLevel warn

        CustomLog ${APACHE_LOG_DIR}/smsgateaway.mobminder.com-access.log combined

</VirtualHost>

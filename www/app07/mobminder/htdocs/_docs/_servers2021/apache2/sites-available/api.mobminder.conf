<VirtualHost *:80>
        ServerAdmin webmaster-noreply@mobminder.com
        ServerName api.mobminder.com
	Redirect / https://api.mobminder.com/
</VirtualHost>
<VirtualHost *:443>

 ServerAdmin webmaster-noreply@mobminder.com
        ServerName api.mobminder.com

        DocumentRoot /var/www/mobminder/htdocs/api

	<Directory /var/www/mobminder/htdocs/>
		AllowOverride none
	</Directory>
        <Directory /var/www/mobminder/htdocs/api/>
		Require all granted
                Options FollowSymLinks MultiViews
                AllowOverride All
                Order allow,deny
                allow from all
        </Directory>

        ErrorLog ${APACHE_LOG_DIR}/api.mobminder.com-error.log

        # Possible values include: debug, info, notice, warn, error, crit,
        # alert, emerg.
        LogLevel warn

        CustomLog ${APACHE_LOG_DIR}/api.mobminder.com-access.log combined

SSLEngine on
        SSLProtocol all
        SSLCertificateFile /etc/apache2/link_to_current_ssl_certifs/mobminder.crt
        SSLCertificateKeyFile /etc/apache2/link_to_current_ssl_certifs/private.key
        SSLCACertificateFile /etc/apache2/link_to_current_ssl_certifs/chain.crt

</VirtualHost>

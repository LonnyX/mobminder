<VirtualHost *:80>
        ServerAdmin webmaster-noreply@mobminder.com
        ServerName ical.mobminder.com

        DocumentRoot /var/www/mobminder/ical

        <Directory /var/www/mobminder/ical>
                Options FollowSymLinks MultiViews
                AllowOverride All
                Order allow,deny
                allow from all
        </Directory>

        ErrorLog ${APACHE_LOG_DIR}/ical.app04.mobminder.com-error.log

        # Possible values include: debug, info, notice, warn, error, crit,
        # alert, emerg.
        LogLevel warn

        CustomLog ${APACHE_LOG_DIR}/ical.app04.mobminder.com-access.log combined
</VirtualHost>
<VirtualHost *:443>

ServerAdmin webmaster-noreply@mobminder.com
        ServerName ical.mobminder.com

        DocumentRoot /var/www/mobminder/ical

        <Directory /var/www/mobminder/ical>
                Options FollowSymLinks MultiViews
                AllowOverride All
                Order allow,deny
                allow from all
        </Directory>

        ErrorLog ${APACHE_LOG_DIR}/ical.app04.mobminder.com-error.log

        # Possible values include: debug, info, notice, warn, error, crit,
        # alert, emerg.
        LogLevel warn

        CustomLog ${APACHE_LOG_DIR}/ical.app04.mobminder.com-access.log combined

SSLEngine on
        SSLProtocol all
        SSLCertificateFile /etc/apache2/link_to_current_ssl_certifs/mobminder.crt
        SSLCertificateKeyFile /etc/apache2/link_to_current_ssl_certifs/private.key
        SSLCACertificateFile /etc/apache2/link_to_current_ssl_certifs/chain.crt

</VirtualHost>

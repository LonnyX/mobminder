<VirtualHost *:80>
       	ServerAdmin app04@mobminder.com
       	ServerName be.mobminder.com
	ServerAlias burogest.mobminder.com
	Redirect / https://be.mobminder.com/
</VirtualHost>
<VirtualHost *:80>
	ServerAdmin app04@mobminder.com
	ServerName fr.mobminder.com
	Redirect / https://fr.mobminder.com/
</VirtualHost>
<VirtualHost *:443>
	
	ServerAdmin app04@mobminder.com
        ServerName be.mobminder.com
        ServerAlias fr.mobminder.com
	ServerAlias login.mobminder.com
	ServerAlias burogest.mobminder.com
	ServerAlias agenda.mobminder.com
        DocumentRoot /var/www/mobminder/htdocs
	AddDefaultCharset UTF-8
        <Directory /var/www/mobminder/htdocs>
                Options FollowSymLinks
                AllowOverride All
                Order allow,deny
                allow from all
        </Directory>

        ErrorLog ${APACHE_LOG_DIR}/be.mobminder.com-error.log

        # Possible values include: debug, info, notice, warn, error, crit,
        # alert, emerg.
        LogLevel warn

        CustomLog ${APACHE_LOG_DIR}/be.mobminder.com-access.log combined
	
  SSLEngine on
        SSLProtocol all	
        SSLCertificateFile /etc/apache2/link_to_current_ssl_certifs/mobminder.crt
        SSLCertificateKeyFile /etc/apache2/link_to_current_ssl_certifs/private.key
        SSLCACertificateFile /etc/apache2/link_to_current_ssl_certifs/chain.crt

</VirtualHost>

<VirtualHost *:80>
        ServerAdmin webmaster-noreply@mobminder.com
        ServerName login.mobminder.com

        DocumentRoot /var/www/mobminder/login

        <Directory /var/www/mobminder/login>
                Options Indexes FollowSymLinks MultiViews
                AllowOverride All
                Order allow,deny
                allow from all
        </Directory>

        ErrorLog ${APACHE_LOG_DIR}/login.mobminder.com-error.log

        # Possible values include: debug, info, notice, warn, error, crit,
        # alert, emerg.
        LogLevel warn

        CustomLog ${APACHE_LOG_DIR}/login.mobminder.com-access.log combined
</VirtualHost>
<VirtualHost *:443>
	ServerAdmin webmaster-noreply@mobminder.com
	ServerName login.mobminder.com

	DocumentRoot /var/www/mobminder/login

	<Directory /var/www/mobminder/login>
		Options FollowSymLinks MultiViews
		AllowOverride All
		Order allow,deny
		allow from all
	</Directory>

	ErrorLog ${APACHE_LOG_DIR}/login.mobminder.com-error.log

	# Possible values include: debug, info, notice, warn, error, crit,
	# alert, emerg.
	LogLevel warn

	CustomLog ${APACHE_LOG_DIR}/login.mobminder.com-access.log combined

SSLEngine on
        SSLProtocol all
        SSLCertificateFile /etc/apache2/link_to_current_ssl_certifs/mobminder.crt
        SSLCertificateKeyFile /etc/apache2/link_to_current_ssl_certifs/private.key
        SSLCACertificateFile /etc/apache2/link_to_current_ssl_certifs/chain.crt

</VirtualHost>
